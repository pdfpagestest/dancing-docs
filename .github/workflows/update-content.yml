name: Update changing.pdf Every 10 Minutes (Weekdays 9–21)

on:
  schedule:
    - cron: "*/10 9-21 * * 1-5"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Overwrite changing.pdf using Bash
        run: |
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          FILE="pdfs/changing.pdf"

          echo "%PDF-1.4" > "$FILE"
          echo "1 0 obj" >> "$FILE"
          echo "<< /Type /Catalog /Pages 2 0 R >>" >> "$FILE"
          echo "endobj" >> "$FILE"
          echo "2 0 obj" >> "$FILE"
          echo "<< /Type /Pages /Kids [3 0 R] /Count 1 >>" >> "$FILE"
          echo "endobj" >> "$FILE"
          echo "3 0 obj" >> "$FILE"
          echo "<< /Type /Page /Parent 2 0 R /MediaBox [0 0 612 792] /Contents 4 0 R /Resources << /Font << /F1 5 0 R >> >> >>" >> "$FILE"
          echo "endobj" >> "$FILE"
          echo "4 0 obj" >> "$FILE"
          echo "<< /Length 60 >>" >> "$FILE"
          echo "stream" >> "$FILE"
          echo "BT" >> "$FILE"
          echo "/F1 24 Tf" >> "$FILE"
          echo "100 700 Td" >> "$FILE"
          echo "(${TS}) Tj" >> "$FILE"
          echo "ET" >> "$FILE"
          echo "endstream" >> "$FILE"
          echo "endobj" >> "$FILE"
          echo "5 0 obj" >> "$FILE"
          echo "<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>" >> "$FILE"
          echo "endobj" >> "$FILE"
          echo "xref" >> "$FILE"
          echo "0 6" >> "$FILE"
          echo "0000000000 65535 f " >> "$FILE"
          echo "0000000010 00000 n " >> "$FILE"
          echo "0000000060 00000 n " >> "$FILE"
          echo "0000000115 00000 n " >> "$FILE"
          echo "0000000270 00000 n " >> "$FILE"
          echo "0000000370 00000 n " >> "$FILE"
          echo "trailer" >> "$FILE"
          echo "<< /Size 6 /Root 1 0 R >>" >> "$FILE"
          echo "startxref" >> "$FILE"
          echo "450" >> "$FILE"
          echo "%%EOF" >> "$FILE"

      - name: Commit and push updated PDF
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add pdfs/changing.pdf
          git commit -m "Updated changing.pdf at $(date -u)" || echo "No changes to commit"
          git push
