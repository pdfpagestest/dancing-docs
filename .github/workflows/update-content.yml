name: Update changing.pdf Every 10 Minutes (Weekdays 9–21)

on:
  schedule:
    - cron: "*/10 9-21 * * 1-5"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Overwrite changing.pdf using Bash
        run: |
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          FILE="pdfs/changing.pdf"

          # Write the first part of the PDF
          cat > "$FILE" << 'EOF'
%PDF-1.4
1 0 obj
<< /Type /Catalog /Pages 2 0 R >>
endobj
2 0 obj
<< /Type /Pages /Kids [3 0 R] /Count 1 >>
endobj
3 0 obj
<< /Type /Page /Parent 2 0 R /MediaBox [0 0 612 792] /Contents 4 0 R /Resources << /Font << /F1 5 0 R >> >> >>
endobj
4 0 obj
<< /Length 60 >>
stream
BT
/F1 24 Tf
100 700 Td
EOF

          # Insert timestamp line
          echo "(${TS}) Tj" >> "$FILE"

          # Finish the PDF
          cat >> "$FILE" << 'EOF'
ET
endstream
endobj
5 0 obj
<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>
endobj
xref
0 6
0000000000 65535 f 
0000000010 00000 n 
0000000060 00000 n 
0000000115 00000 n 
0000000270 00000 n 
0000000370 00000 n 
trailer
<< /Size 6 /Root 1 0 R >>
startxref
450
%%EOF
EOF

      - name: Commit and push updated PDF
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add pdfs/changing.pdf
          git commit -m "Updated changing.pdf at $(date -u)" || echo "No changes to commit"
          git push
